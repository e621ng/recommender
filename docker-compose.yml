services:
  api:
    build: .
    command: ["api"]
    ports:
      - "8000:8000"
    volumes:
      - models:/models
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  updater:
    build: .
    command: ["update"]
    volumes:
      - models:/models
      - ./recommender:/usr/local/lib/python3.11/site-packages/recommender
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - updater

volumes:
  models:
